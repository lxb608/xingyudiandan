<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>下单成功 - 星语俱乐部</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    /* 背景图地址保持不变 */
    background: url('https://img1.baidu.com/it/u=3871342735,3851935393&fm=253&fmt=auto&app=138&f=JPEG?w=800&h=500') no-repeat center center fixed;
    background-size: cover; color: #fff;
    padding: 15px; min-height: 100vh; text-align: center;
    position: relative;
  }
  
  body::before {
    content: ''; position: fixed; top:0; left:0; right:0; bottom:0;
    background: rgba(0, 20, 50, 0.8); z-index: -1;
  }

  .result-card {
    background: rgba(20, 40, 80, 0.9);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    padding: 30px 20px; border-radius: 25px;
    border: 1px solid rgba(255, 215, 0, 0.4);
    margin-top: 40px;
  }

  h1 { color: #4CAF50; font-size: 36px; margin-bottom: 15px; }

  .info {
    background: rgba(0,0,0,0.4); padding: 20px; border-radius: 15px;
    margin: 25px 0; text-align: left; line-height: 2; font-size: 18px;
  }

  .info strong { color: #ffd700; }

  /* 二维码区域 */
  .qrcode-wrap { 
    display: flex; 
    justify-content: center; 
    gap: 30px; 
    flex-wrap: wrap; 
    margin: 30px 0; 
  }
  
  /* 这里修改了图片尺寸，使其在手机上显示更大更清晰 */
  .qrcode { 
    width: 200px; 
    height: 200px; 
    background: #fff; 
    padding: 10px; 
    border-radius: 15px; 
    border: 2px solid #ffd700; /* 增加金色边框，更高级 */
  }

  /* 红色提醒 */
  .tip {
    color: #ff4444; 
    font-weight: bold; 
    font-size: 22px;
    margin: 30px 0; 
    text-shadow: 0 0 10px rgba(255,0,0,0.6);
  }

  .btn {
    display: inline-block; 
    padding: 15px 35px; 
    background: #ffd700;
    color: #333; 
    text-decoration: none; 
    border-radius: 50px;
    font-size: 18px; 
    font-weight: bold; 
    margin: 10px;
  }
</style>
</head>
<body>

<div class="result-card">
  <h1>✅ 下单提交成功！</h1>
  <p>你的订单已提交，感谢信任！</p>

  <div class="info">
    <p><strong>订单信息：</strong></p>
    <p>昵称：<span id="nick"></span></p>
    <p>服务：<span id="service"></span></p>
    <p>时间：<span id="time"></span></p>
    <p>备注：<span id="remark"></span></p>
  </div>

  <!-- 二维码图片区域：已替换为你提供的 URL -->
  <div class="qrcode-wrap">
    <!-- QQ 图片 -->
    <img src="B7fd8af4545b609e0b51890f66335d17.jpeg" alt="QQ客服二维码" class="qrcode">
    
    <!-- 微信 图片 -->
    <img src="189dbd408ed5bc79e9b7965259a7f91a.jpeg" alt="微信客服二维码" class="qrcode">
  </div>

  <div class="tip">
    一定要添加客服微信或QQ！！！客服会给你派单
  </div>

  <p>
    <a href="index.html" class="btn">返回首页</a>
    <a href="order.html" class="btn">继续点单</a>
  </p>
</div>

<script>
// 获取URL参数并展示订单信息
const params = new URLSearchParams(location.search);
document.getElementById("nick").innerText = params.get("nickname") || "未填写";
document.getElementById("service").innerText = params.get("service") || "未填写";

let time = params.get("time") || "";
if (time === "其他") time += "：" + params.get("otherTime");
document.getElementById("time").innerText = time || "未填写";

document.getElementById("remark").innerText = params.get("remark") || "无";
</script>

</body>
</html>
