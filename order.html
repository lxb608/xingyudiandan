<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>星语俱乐部 - 点单</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: url('https://img1.baidu.com/it/u=3871342735,3851935393&fm=253&fmt=auto&app=138&f=JPEG?w=800&h=500') no-repeat center center fixed;
    background-size: cover;
    color: #333; padding: 15px; min-height: 100vh;
    position: relative;
  }
  
  body::before {
    content: ''; position: fixed; top:0; left:0; right:0; bottom:0;
    background: rgba(0, 20, 50, 0.75); z-index: -1;
  }

  .back {
    display: inline-block; color: #ffd700; font-size: 18px;
    margin-bottom: 15px; text-decoration: none; font-weight: bold;
  }

  .form-box {
    background: #fff; border-radius: 20px; padding: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }

  h2 { text-align: center; margin-bottom: 25px; font-size: 24px; }

  .form-group { margin: 20px 0; }

  label {
    display: block; font-weight: bold; margin-bottom: 8px;
    font-size: 16px;
  }

  input, select, textarea {
    width: 100%; padding: 15px; font-size: 18px;
    border: 2px solid #ddd; border-radius: 12px;
  }

  input:focus, select:focus { border-color: #ffd700; outline: none; }

  button {
    width: 100%; padding: 18px; background: #ffd700;
    border: none; border-radius: 12px; font-size: 20px;
    font-weight: bold; margin-top: 10px; cursor: pointer;
  }
</style>
</head>
<body>

<div class="form-box">
  <a href="index.html" class="back">← 返回首页</a>
  <h2>服务点单</h2>

  <form action="result.html" method="get">
    <div class="form-group">
      <label>游戏昵称 *</label>
      <input type="text" name="nickname" required placeholder="请输入昵称">
    </div>

    <div class="form-group">
      <label>服务类型 *</label>
      <select name="service" required>
        <option value="">请选择</option>
        <option value="陪玩（娱乐）">陪玩（娱乐）</option>
        <option value="陪玩（技术）">陪玩（技术）</option>
        <option value="代打">代打</option>
        <option value="哄睡">哄睡</option>
        <option value="陪聊">陪聊</option>
      </select>
    </div>

    <div class="form-group">
      <label>服务时间 *</label>
      <select name="time" required onchange="checkOther(this)">
        <option value="">请选择</option>
        <option value="一局">一局</option>
        <option value="1小时">1小时</option>
        <option value="2小时">2小时</option>
        <option value="3小时">3小时</option>
        <option value="4小时">4小时</option>
        <option value="其他">其他</option>
      </select>
      <div id="otherBox" style="display:none; margin-top:10px;">
        <input type="text" name="otherTime" placeholder="请填写具体时间">
      </div>
    </div>

    <div class="form-group">
      <label>备注（选填）</label>
      <textarea name="remark" rows="4" placeholder="特殊要求或代打目标"></textarea>
    </div>

    <button type="submit">确认下单</button>
  </form>
</div>

<script>
function checkOther(sel) {
  document.getElementById("otherBox").style.display =
    sel.value === "其他" ? "block" : "none";
}
</script>

</body>
</html>
